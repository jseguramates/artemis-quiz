<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis Quiz — Panell del Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --space: #020818;
  --deep: #050d2a;
  --panel: #0a1535;
  --panel2: #0d1d45;
  --accent: #4fc3f7;
  --accent2: #7c4dff;
  --gold: #ffd54f;
  --green: #69f0ae;
  --red: #ff5252;
  --text: #e8f4fd;
  --muted: #7a9cc0;
  --border: rgba(79,195,247,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--space);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(124,77,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(79,195,247,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}
.container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.logo-moon {
  width: 48px; height: 48px;
  background: radial-gradient(circle at 35% 35%, #fff8e1, #ffd54f, #f57f17);
  border-radius: 50%;
  position: relative;
  box-shadow: 0 0 20px rgba(255,213,79,0.4);
  flex-shrink: 0;
}
.logo-moon::after {
  content: '';
  position: absolute;
  top: 6px; right: 4px;
  width: 14px; height: 14px;
  background: var(--space);
  border-radius: 50%;
}
h1 { font-family: 'Orbitron', monospace; font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; color: var(--accent); }
h1 span { color: var(--gold); }
.subtitle-header { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

.status-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 6px 16px;
  font-size: 0.8rem;
  color: var(--muted);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.status-dot.on { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.75rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.25rem;
}

label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.5px; display: block; margin-bottom: 6px; margin-top: 1rem; }
label:first-of-type { margin-top: 0; }
input[type="text"], input[type="number"], select {
  width: 100%;
  background: var(--deep);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: var(--deep); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-launch {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: white;
  width: 100%;
  margin-top: 1.25rem;
  padding: 16px;
  font-size: 0.9rem;
  box-shadow: 0 4px 20px rgba(79,195,247,0.3);
}
.btn-launch:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,195,247,0.4); }
.btn-next {
  background: linear-gradient(135deg, #1b5e20, var(--green));
  color: var(--space);
  width: 100%;
  padding: 16px;
  margin-top: 0.75rem;
}
.btn-reset {
  background: transparent;
  border: 1px solid var(--red);
  color: var(--red);
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 1px;
  margin-top: 0.5rem;
}
.btn-reset:hover { background: rgba(255,82,82,0.1); }

.eq-display {
  font-family: 'Orbitron', monospace;
  font-size: 2rem;
  font-weight: 700;
  text-align: center;
  color: var(--gold);
  padding: 1.5rem;
  background: var(--deep);
  border-radius: 12px;
  border: 1px solid rgba(255,213,79,0.2);
  margin-bottom: 1rem;
  text-shadow: 0 0 20px rgba(255,213,79,0.4);
  letter-spacing: 2px;
}

.countdown {
  font-family: 'Orbitron', monospace;
  font-size: 4rem;
  font-weight: 900;
  text-align: center;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(79,195,247,0.6);
  line-height: 1;
  margin: 0.5rem 0;
}
.countdown.urgent { color: var(--red); text-shadow: 0 0 30px rgba(255,82,82,0.6); }

.resp-count {
  text-align: center;
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
}
.resp-count strong { color: var(--green); font-size: 1.2rem; }

.btn-close {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: white;
  width: 100%;
  padding: 14px;
  font-family: 'Orbitron', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.btn-close:hover { opacity: 0.85; }

.solution-reveal {
  text-align: center;
  margin-bottom: 1.25rem;
  padding: 1rem;
  background: rgba(105,240,174,0.08);
  border: 1px solid rgba(105,240,174,0.2);
  border-radius: 10px;
}
.solution-reveal .sol-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.solution-reveal .sol-val { font-family: 'Orbitron', monospace; font-size: 1.5rem; color: var(--green); font-weight: 700; }

table { width: 100%; border-collapse: collapse; }
th { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
td { padding: 10px 12px; border-bottom: 1px solid rgba(79,195,247,0.08); font-size: 0.9rem; }
tr:last-child td { border-bottom: none; }

.badge { display: inline-block; font-size: 0.7rem; padding: 3px 10px; border-radius: 99px; font-weight: 700; font-family: 'Orbitron', monospace; letter-spacing: 0.5px; }
.badge-ok { background: rgba(105,240,174,0.15); color: var(--green); border: 1px solid rgba(105,240,174,0.3); }
.badge-ko { background: rgba(255,82,82,0.15); color: var(--red); border: 1px solid rgba(255,82,82,0.3); }

.ranking-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: var(--deep);
  border: 1px solid var(--border);
  transition: all 0.3s;
}
.ranking-item.pos-1 { background: rgba(255,213,79,0.1); border-color: rgba(255,213,79,0.3); }
.ranking-item.pos-2 { background: rgba(176,190,197,0.08); border-color: rgba(176,190,197,0.2); }
.ranking-item.pos-3 { background: rgba(255,138,101,0.08); border-color: rgba(255,138,101,0.2); }
.rank-pos { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 900; width: 32px; color: var(--muted); }
.pos-1 .rank-pos { color: var(--gold); text-shadow: 0 0 10px rgba(255,213,79,0.5); }
.pos-2 .rank-pos { color: #b0bec5; }
.pos-3 .rank-pos { color: #ff8a65; }
.rank-name { flex: 1; font-size: 1rem; font-weight: 500; }
.rank-pts { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; color: var(--accent); }

.rocket-icon { font-size: 1.2rem; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header>
    <div class="logo-moon"></div>
    <div>
      <h1>ARTEMIS <span>QUIZ</span></h1>
      <div class="subtitle-header">Panell del professor — Missió Monomis</div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connectant...</span>
    </div>
  </header>

  <!-- SETUP -->
  <div id="prof-setup">
    <div class="panel">
      <div class="panel-title">Nova pregunta</div>
      <label>Operació amb monomis</label>
      <input type="text" id="inp-pregunta" placeholder="ex: 3x² · 2x³ = ?" />
      <label>Resposta correcta</label>
      <input type="text" id="inp-solucio" placeholder="ex: 6x⁵" />
      <label>Temps (segons)</label>
      <select id="inp-temps">
        <option value="30">30 s</option>
        <option value="45" selected>45 s</option>
        <option value="60">60 s</option>
        <option value="90">90 s</option>
      </select>
      <button class="btn btn-launch" onclick="launchQuestion()">&#9654; Llançar pregunta</button>
    </div>
  </div>

  <!-- ACTIVA -->
  <div id="prof-active" style="display:none">
    <div class="panel">
      <div class="panel-title">Pregunta en curs</div>
      <div class="eq-display" id="prof-eq-display"></div>
      <div class="countdown" id="prof-counter">45</div>
      <div class="resp-count"><strong id="resp-num">0</strong> respostes rebudes</div>
      <button class="btn-close" onclick="closeQuestion()">Tancar ronda i veure resultats</button>
      <div style="text-align:center; margin-top:0.75rem;">
        <button class="btn-reset" onclick="resetGame()">Reiniciar joc</button>
      </div>
    </div>
  </div>

  <!-- RESULTATS -->
  <div id="prof-results" style="display:none">
    <div class="panel">
      <div class="panel-title">Resultats de la ronda</div>
      <div class="solution-reveal">
        <div class="sol-label">Resposta correcta</div>
        <div class="sol-val" id="prof-sol-display"></div>
      </div>
      <table>
        <thead><tr><th>Alumne</th><th>Resposta</th><th>Resultat</th><th>Punts</th></tr></thead>
        <tbody id="prof-resp-tbody"></tbody>
      </table>
    </div>
    <div class="panel">
      <div class="panel-title">Ranking de la missió</div>
      <div id="prof-ranking-list"></div>
      <button class="btn btn-next" onclick="nextQuestion()">&#9654; Propera pregunta</button>
      <div style="text-align:center; margin-top:0.5rem;">
        <button class="btn-reset" onclick="resetGame()">Reiniciar joc complet</button>
      </div>
    </div>
  </div>
</div>

<script>
const DB = 'https://monomis-quiz-default-rtdb.europe-west1.firebasedatabase.app';
let pollInterval = null, countdownInterval = null;

function mkStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--d', (2+Math.random()*4)+'s');
    s.style.setProperty('--delay', (Math.random()*4)+'s');
    s.style.opacity = Math.random()*0.8;
    c.appendChild(s);
  }
}
mkStars();

async function fbGet(path) {
  const r = await fetch(DB + path + '.json');
  return r.json();
}
async function fbSet(path, data) {
  await fetch(DB + path + '.json', { method: 'PUT', body: JSON.stringify(data) });
}
async function fbPatch(path, data) {
  await fetch(DB + path + '.json', { method: 'PATCH', body: JSON.stringify(data) });
}
async function fbDelete(path) {
  await fetch(DB + path + '.json', { method: 'DELETE' });
}

async function init() {
  try {
    await fbGet('/game');
    document.getElementById('status-dot').className = 'status-dot on';
    document.getElementById('status-text').textContent = 'Connectat';
  } catch(e) {
    document.getElementById('status-text').textContent = 'Error de connexió';
  }
}
init();

async function launchQuestion() {
  const q = document.getElementById('inp-pregunta').value.trim();
  const sol = document.getElementById('inp-solucio').value.trim();
  const temps = parseInt(document.getElementById('inp-temps').value);
  if (!q || !sol) { alert('Omple la pregunta i la solució!'); return; }
  const qId = Date.now();
  await fbSet('/game', { phase: 'active', question: q, solution: sol, questionId: qId, responses: {}, ranking: [] });
  document.getElementById('prof-setup').style.display = 'none';
  document.getElementById('prof-active').style.display = 'block';
  document.getElementById('prof-results').style.display = 'none';
  document.getElementById('prof-eq-display').textContent = q;
  startCountdown(temps);
  startProfPoll();
}

function startCountdown(secs) {
  let t = secs;
  const el = document.getElementById('prof-counter');
  el.textContent = t;
  el.className = 'countdown';
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(async () => {
    t--;
    el.textContent = t;
    if (t <= 10) el.className = 'countdown urgent';
    if (t <= 0) { clearInterval(countdownInterval); await closeQuestion(); }
  }, 1000);
}

function startProfPoll() {
  if (pollInterval) clearInterval(pollInterval);
  pollProf();
  pollInterval = setInterval(pollProf, 2000);
}

async function pollProf() {
  const state = await fbGet('/game');
  if (!state || state.phase !== 'active') return;
  const responses = state.responses || {};
  document.getElementById('resp-num').textContent = Object.keys(responses).length;
}

async function closeQuestion() {
  if (countdownInterval) clearInterval(countdownInterval);
  if (pollInterval) clearInterval(pollInterval);
  const state = await fbGet('/game');
  if (!state) return;
  const responses = state.responses || {};
  const players = await fbGet('/players') || {};
  const ranking = Object.values(players).sort((a,b)=>(b.points||0)-(a.points||0)).map(p=>({name:p.name,points:p.points||0}));
  await fbPatch('/game', { phase: 'results', ranking });
  renderResults(responses, state.solution, ranking);
  document.getElementById('prof-active').style.display = 'none';
  document.getElementById('prof-results').style.display = 'block';
}

function renderResults(responses, solution, ranking) {
  document.getElementById('prof-sol-display').textContent = solution;
  const rows = Object.values(responses);
  document.getElementById('prof-resp-tbody').innerHTML = rows.length
    ? rows.map(r=>`<tr><td>${r.name}</td><td style="font-family:monospace">${r.answer}</td><td><span class="badge ${r.correct?'badge-ok':'badge-ko'}">${r.correct?'CORRECTE':'INCORRECTE'}</span></td><td style="color:var(--gold);font-weight:700">${r.points}</td></tr>`).join('')
    : '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1rem">Cap resposta rebuda</td></tr>';
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('prof-ranking-list').innerHTML = ranking.slice(0,10).map((r,i)=>`
    <div class="ranking-item ${i<3?'pos-'+(i+1):''}">
      <div class="rank-pos">${medals[i]||('#'+(i+1))}</div>
      <div class="rank-name">${r.name}</div>
      <div class="rank-pts">${r.points} pts</div>
    </div>`).join('');
}

async function nextQuestion() {
  await fbSet('/game', { phase: 'waiting' });
  document.getElementById('inp-pregunta').value = '';
  document.getElementById('inp-solucio').value = '';
  document.getElementById('prof-setup').style.display = 'block';
  document.getElementById('prof-results').style.display = 'none';
}

async function resetGame() {
  if (!confirm('Segur? Això esborrarà tots els punts i jugadors.')) return;
  await fbSet('/game', { phase: 'waiting' });
  await fbDelete('/players');
  document.getElementById('inp-pregunta').value = '';
  document.getElementById('inp-solucio').value = '';
  document.getElementById('prof-active').style.display = 'none';
  document.getElementById('prof-results').style.display = 'none';
  document.getElementById('prof-setup').style.display = 'block';
  if (countdownInterval) clearInterval(countdownInterval);
  if (pollInterval) clearInterval(pollInterval);
}
</script>
</body>
</html>
