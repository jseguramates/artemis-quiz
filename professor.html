<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis Quiz — Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--space:#020818;--deep:#050d2a;--panel:#0a1535;--accent:#4fc3f7;--accent2:#7c4dff;--gold:#ffd54f;--green:#69f0ae;--red:#ff5252;--text:#e8f4fd;--muted:#7a9cc0;--border:rgba(79,195,247,0.2);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--space);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(124,77,255,0.06),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(79,195,247,0.04),transparent 50%);pointer-events:none;z-index:0;}
.container{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:1.5rem;}

header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.logo-moon{width:40px;height:40px;background:radial-gradient(circle at 35% 35%,#fff8e1,#ffd54f,#f57f17);border-radius:50%;position:relative;box-shadow:0 0 16px rgba(255,213,79,0.4);flex-shrink:0;}
.logo-moon::after{content:'';position:absolute;top:5px;right:3px;width:12px;height:12px;background:var(--space);border-radius:50%;}
h1{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:2px;color:var(--accent);}
h1 span{color:var(--gold);}
.subtitle-header{font-size:0.7rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.session-name{font-size:0.8rem;color:var(--gold);margin-top:2px;font-style:italic;}
.status-pill{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:99px;padding:5px 14px;font-size:0.75rem;color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--red);}
.status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.nav-tabs{display:flex;gap:6px;margin-bottom:1.25rem;}
.nav-tab{padding:7px 18px;font-size:0.72rem;font-family:'Orbitron',monospace;letter-spacing:1px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.nav-tab.active{background:var(--panel);border-color:var(--accent);color:var(--accent);}
.nav-view{display:none;}
.nav-view.active{display:block;}

.main-grid{display:grid;grid-template-columns:1fr 260px;gap:1.25rem;align-items:start;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.panel-title{font-family:'Orbitron',monospace;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;}

.tabs{display:flex;gap:5px;margin-bottom:0.75rem;}
.tab{padding:5px 14px;font-size:0.7rem;font-family:'Orbitron',monospace;letter-spacing:1px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.tab.active-easy{background:rgba(105,240,174,0.12);border-color:rgba(105,240,174,0.4);color:var(--green);}
.tab.active-mid{background:rgba(255,213,79,0.12);border-color:rgba(255,213,79,0.4);color:var(--gold);}
.tab.active-hard{background:rgba(255,82,82,0.12);border-color:rgba(255,82,82,0.4);color:var(--red);}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0.75rem;max-height:260px;overflow-y:auto;padding-right:4px;}
.lib-card{background:var(--deep);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all 0.2s;text-align:left;}
.lib-card:hover{border-color:var(--accent);}
.lib-card.selected{border-color:var(--gold);background:rgba(255,213,79,0.06);}
.lib-eq{font-family:'Orbitron',monospace;font-size:0.7rem;color:var(--gold);margin-bottom:2px;}
.lib-sol{font-size:0.62rem;color:var(--muted);}
.lib-type{font-size:0.58rem;color:var(--accent);opacity:0.7;margin-top:2px;}
.divider{display:flex;align-items:center;gap:10px;margin:0.75rem 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:0.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
label{font-size:0.75rem;color:var(--muted);letter-spacing:0.5px;display:block;margin-bottom:5px;margin-top:0.75rem;}
label:first-of-type{margin-top:0;}
input[type="text"],select{width:100%;background:var(--deep);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
input:focus,select:focus{border-color:var(--accent);}
select option{background:var(--deep);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;width:100%;margin-top:0.75rem;}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;box-shadow:0 3px 14px rgba(79,195,247,0.25);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-green{background:linear-gradient(135deg,#1b5e20,var(--green));color:var(--space);}
.btn-purple{background:linear-gradient(135deg,#4a0080,var(--accent2));color:white;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);font-size:0.65rem;padding:7px 14px;}
.btn-danger:hover{background:rgba(255,82,82,0.1);}
.btn-gold{background:transparent;border:1px solid var(--gold);color:var(--gold);font-size:0.65rem;padding:7px 14px;}
.btn-gold:hover{background:rgba(255,213,79,0.1);}

/* ESTAT EN CURS */
.active-info{background:var(--deep);border:1px solid rgba(255,213,79,0.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1rem;}
.active-eq{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--gold);margin-bottom:0.5rem;}
.active-meta{font-size:0.8rem;color:var(--muted);}
.active-meta strong{color:var(--green);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:0.75rem;}
.stat-card{background:var(--deep);border-radius:8px;padding:10px;text-align:center;border:1px solid var(--border);}
.stat-val{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;margin-bottom:3px;}
.stat-label{font-size:0.65rem;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
.stat-val.good{color:var(--green);}
.stat-val.mid{color:var(--gold);}
.stat-val.bad{color:var(--red);}
.semaforo{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:0.85rem;margin-bottom:0.75rem;}
.semaforo.green{background:rgba(105,240,174,0.1);border:1px solid rgba(105,240,174,0.3);color:var(--green);}
.semaforo.yellow{background:rgba(255,213,79,0.1);border:1px solid rgba(255,213,79,0.3);color:var(--gold);}
.semaforo.red{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:var(--red);}
.sem-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.semaforo.green .sem-dot{background:var(--green);}
.semaforo.yellow .sem-dot{background:var(--gold);}
.semaforo.red .sem-dot{background:var(--red);}

table{width:100%;border-collapse:collapse;}
th{font-size:0.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;}
td{padding:8px 10px;border-bottom:1px solid rgba(79,195,247,0.07);font-size:0.85rem;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-block;font-size:0.65rem;padding:2px 8px;border-radius:99px;font-weight:700;font-family:'Orbitron',monospace;}
.badge-ok{background:rgba(105,240,174,0.15);color:var(--green);border:1px solid rgba(105,240,174,0.3);}
.badge-ko{background:rgba(255,82,82,0.15);color:var(--red);border:1px solid rgba(255,82,82,0.3);}

/* SIDEBAR */
.sidebar-panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden;margin-bottom:1rem;}
.sidebar-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);}
.student-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:5px;background:var(--deep);border:1px solid var(--border);}
.student-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);flex-shrink:0;}
.student-name{flex:1;font-size:0.85rem;}
.student-pts{font-family:'Orbitron',monospace;font-size:0.7rem;color:var(--accent);}
.btn-kick{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:0.75rem;padding:2px 5px;border-radius:4px;opacity:0.5;transition:opacity 0.2s;}
.btn-kick:hover{opacity:1;background:rgba(255,82,82,0.1);}
.empty-txt{font-size:0.8rem;color:var(--muted);text-align:center;padding:1rem 0;}

/* HISTORIAL */
.hist-item{background:var(--deep);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:7px;cursor:pointer;transition:all 0.2s;}
.hist-item:hover{border-color:var(--accent);}
.hist-name{font-size:0.9rem;font-weight:500;margin-bottom:3px;}
.hist-meta{font-size:0.72rem;color:var(--muted);}

/* PODI */
.podi-overlay{position:fixed;inset:0;background:rgba(2,8,24,0.97);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn 0.5s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.podi-title{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--accent);letter-spacing:3px;margin-bottom:0.4rem;text-align:center;}
.podi-sub{font-size:0.8rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:2.5rem;text-align:center;}
.podi-bars{display:flex;align-items:flex-end;justify-content:center;gap:1rem;margin-bottom:1.5rem;}
.podi-bar{display:flex;flex-direction:column;align-items:center;gap:0.6rem;}
.podi-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;font-family:'Orbitron',monospace;border:2px solid;}
.podi-bar:nth-child(1) .podi-avatar{background:rgba(176,190,197,0.15);border-color:#b0bec5;color:#b0bec5;}
.podi-bar:nth-child(2) .podi-avatar{background:rgba(255,213,79,0.15);border-color:var(--gold);color:var(--gold);}
.podi-bar:nth-child(3) .podi-avatar{background:rgba(255,138,101,0.15);border-color:#ff8a65;color:#ff8a65;}
.podi-pname{font-size:0.8rem;font-weight:500;color:var(--text);text-align:center;max-width:90px;}
.podi-pts{font-family:'Orbitron',monospace;font-size:0.72rem;color:var(--muted);text-align:center;}
.podi-block{border-radius:6px 6px 0 0;width:90px;display:flex;align-items:center;justify-content:center;}
.podi-bar:nth-child(1) .podi-block{height:90px;background:rgba(176,190,197,0.12);border:1px solid rgba(176,190,197,0.25);}
.podi-bar:nth-child(2) .podi-block{height:130px;background:rgba(255,213,79,0.12);border:1px solid rgba(255,213,79,0.25);}
.podi-bar:nth-child(3) .podi-block{height:70px;background:rgba(255,138,101,0.1);border:1px solid rgba(255,138,101,0.25);}
.podi-medal{font-size:1.8rem;}
.podi-close{font-family:'Orbitron',monospace;font-size:0.7rem;padding:10px 28px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;letter-spacing:1px;margin-top:0.75rem;}
.podi-close:hover{border-color:var(--accent);color:var(--accent);}
.confetti-piece{position:fixed;width:7px;height:7px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

.btn-row{display:flex;gap:8px;margin-top:0.75rem;}
.btn-row .btn{margin-top:0;flex:1;}
</style>
</head>
<body>
<div id="podi-overlay" class="podi-overlay"></div>
<div class="container">
  <header>
    <div class="logo-moon"></div>
    <div>
      <h1>ARTEMIS <span>QUIZ</span></h1>
      <div class="subtitle-header">Panell del professor</div>
      <div class="session-name" id="session-name-display"></div>
    </div>
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Connectant...</span>
    </div>
  </header>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showNav('joc',this)">&#9654; Joc</button>
    <button class="nav-tab" onclick="showNav('historial',this)">&#9776; Historial</button>
  </div>

  <!-- VISTA JOC -->
  <div class="nav-view active" id="nav-joc">
    <div style="display:flex;justify-content:flex-end;margin-bottom:0.75rem;">
      <button class="btn btn-gold" style="width:auto;margin-top:0" onclick="downloadReport()">&#8595; Descarregar resum</button>
    </div>
    <div class="main-grid">
      <div>
        <!-- SETUP -->
        <div id="prof-setup">
          <div class="panel">
            <div class="panel-title">Nom de la sessió</div>
            <input type="text" id="inp-session" placeholder="ex: Sessió 3 — Monomis amb dues variables" />
            <button class="btn btn-primary" onclick="saveSessionName()">Guardar nom</button>
          </div>
          <div class="panel">
            <div class="panel-title">Biblioteca de preguntes</div>
            <div class="tabs">
              <button class="tab active-easy" onclick="setTab('easy',this)">Fàcil</button>
              <button class="tab" onclick="setTab('mid',this)">Mitjà</button>
              <button class="tab" onclick="setTab('hard',this)">Difícil</button>
            </div>
            <div class="lib-grid" id="lib-grid"></div>
            <div class="divider"><span>o escriu una pregunta nova</span></div>
            <label>Operació</label>
            <input type="text" id="inp-pregunta" placeholder="ex: 3x² · 2x³ = ?" />
            <label>Resposta correcta</label>
            <input type="text" id="inp-solucio" placeholder="ex: 6x⁵" />
            <label>Temps</label>
            <select id="inp-temps">
              <option value="30">30 s</option>
              <option value="45" selected>45 s</option>
              <option value="60">60 s</option>
              <option value="90">90 s</option>
            </select>
            <button class="btn btn-primary" onclick="launchQuestion()">&#9654; Llançar pregunta</button>
          </div>
        </div>

        <!-- ACTIVA -->
        <div id="prof-active" style="display:none">
          <div class="panel">
            <div class="panel-title">Pregunta en curs</div>
            <div class="active-info">
              <div class="active-eq" id="prof-eq-display"></div>
              <div class="active-meta"><strong id="resp-num">0</strong> / <span id="resp-total">0</span> alumnes han respost</div>
            </div>
            <button class="btn btn-primary" onclick="closeQuestion()">Tancar ronda i veure resultats</button>
            <div style="text-align:center;margin-top:0.5rem;">
              <button class="btn btn-danger" style="width:auto" onclick="resetGame()">Reiniciar joc</button>
            </div>
          </div>
        </div>

        <!-- RESULTATS -->
        <div id="prof-results" style="display:none">
          <div class="panel">
            <div class="panel-title">Feedback de la ronda</div>
            <div class="stats-grid" id="round-stats"></div>
            <div id="round-semaforo"></div>
            <table>
              <thead><tr><th>Alumne</th><th>Resposta</th><th>Resultat</th><th>Pts</th></tr></thead>
              <tbody id="prof-resp-tbody"></tbody>
            </table>
          </div>
          <div class="panel">
            <div class="panel-title">Accions</div>
            <div class="btn-row">
              <button class="btn btn-green" onclick="nextQuestion()">&#9654; Propera pregunta</button>
              <button class="btn btn-purple" onclick="endSession()">&#9733; Finalitzar sessió</button>
            </div>
            <div style="text-align:center;margin-top:0.5rem;">
              <button class="btn btn-danger" style="width:auto" onclick="resetGame()">Reiniciar joc complet</button>
            </div>
          </div>
        </div>
      </div>

      <!-- SIDEBAR -->
      <div>
        <div class="sidebar-panel">
          <div class="panel-title">Alumnes connectats</div>
          <div id="students-list"><div class="empty-txt">Esperant alumnes...</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="nav-view" id="nav-historial">
    <div class="panel">
      <div class="panel-title">Sessions anteriors</div>
      <div id="hist-list"><div class="empty-txt">Carregant...</div></div>
    </div>
    <div class="panel" id="hist-detail" style="display:none">
      <div class="panel-title" id="hist-detail-title"></div>
      <div id="hist-detail-content"></div>
      <button class="btn btn-gold" style="width:auto;margin-top:0.75rem" onclick="downloadHistReport()">&#8595; Descarregar resum</button>
    </div>
  </div>
</div>

<script>
const DB='https://monomis-quiz-default-rtdb.europe-west1.firebasedatabase.app';
let pollInterval=null,currentTab='easy',sessionName='',selectedHistSession=null;

const LIBRARY={
  easy:[
    {eq:'3x + 2x = ?',sol:'5x',type:'Suma'},
    {eq:'7x - 4x = ?',sol:'3x',type:'Resta'},
    {eq:'5x² + 3x² = ?',sol:'8x²',type:'Suma'},
    {eq:'9x³ - 2x³ = ?',sol:'7x³',type:'Resta'},
    {eq:'2x · 3x = ?',sol:'6x²',type:'Multiplicació'},
    {eq:'4x · 2x² = ?',sol:'8x³',type:'Multiplicació'},
    {eq:'6x² ÷ 2x = ?',sol:'3x',type:'Divisió'},
    {eq:'8x³ ÷ 4x = ?',sol:'2x²',type:'Divisió'},
    {eq:'(2x)² = ?',sol:'4x²',type:'Potència'},
    {eq:'(3x)² = ?',sol:'9x²',type:'Potència'},
    {eq:'5x · 4x = ?',sol:'20x²',type:'Multiplicació'},
    {eq:'10x⁴ ÷ 5x² = ?',sol:'2x²',type:'Divisió'},
  ],
  mid:[
    {eq:'3x²y + 5x²y = ?',sol:'8x²y',type:'Suma'},
    {eq:'9x²y - 4x²y = ?',sol:'5x²y',type:'Resta'},
    {eq:'(-3x²) · 2x = ?',sol:'-6x³',type:'Multiplicació'},
    {eq:'(2x³)² · 3x = ?',sol:'12x⁷',type:'Potència'},
    {eq:'15x⁴ ÷ 5x² = ?',sol:'3x²',type:'Divisió'},
    {eq:'(-2x)³ = ?',sol:'-8x³',type:'Potència'},
    {eq:'4x²y · 3xy = ?',sol:'12x³y²',type:'Multiplicació'},
    {eq:'12x³y² ÷ 4xy = ?',sol:'3x²y',type:'Divisió'},
    {eq:'6x²y - 2x²y + x²y = ?',sol:'5x²y',type:'Suma/Resta'},
    {eq:'(3x²)² = ?',sol:'9x⁴',type:'Potència'},
    {eq:'5x³ - 3x³ + x³ = ?',sol:'3x³',type:'Suma/Resta'},
    {eq:'(-x²)³ = ?',sol:'-x⁶',type:'Potència'},
  ],
  hard:[
    {eq:'(-2x²y)³ = ?',sol:'-8x⁶y³',type:'Potència'},
    {eq:'4x³y · (-3x²y²) = ?',sol:'-12x⁵y³',type:'Multiplicació'},
    {eq:'(3x²y)² ÷ 3xy = ?',sol:'3x³y',type:'Divisió'},
    {eq:'(-xy²)⁴ · 2x = ?',sol:'2x⁵y⁸',type:'Potència'},
    {eq:'(2x²y)³ ÷ 4x³y = ?',sol:'2x³y²',type:'Divisió'},
    {eq:'3x²y - x²y + 4x²y = ?',sol:'6x²y',type:'Suma/Resta'},
    {eq:'(-3xy)² · 2x²y = ?',sol:'18x⁴y³',type:'Potència'},
    {eq:'8x⁴y³ ÷ (-2x²y) = ?',sol:'-4x²y²',type:'Divisió'},
    {eq:'(2xy²)² · (-x²y) = ?',sol:'-4x⁴y⁵',type:'Potència'},
    {eq:'5x²y³ · (-2xy)² = ?',sol:'20x⁴y⁵',type:'Potència'},
    {eq:'(-2x³y)² ÷ 4x²y = ?',sol:'x⁴y',type:'Divisió'},
    {eq:'(3x²y³)² - 4x⁴y⁶ = ?',sol:'5x⁴y⁶',type:'Suma/Resta'},
  ]
};

function showNav(id,el){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');document.getElementById('nav-'+id).classList.add('active');
  if(id==='historial')loadHistorial();
}
function setTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.className='tab');el.className='tab active-'+tab;renderLib();}
function renderLib(){
  document.getElementById('lib-grid').innerHTML=LIBRARY[currentTab].map((q,i)=>`
    <button class="lib-card" onclick="selectQ(${i})" id="lib-${currentTab}-${i}">
      <div class="lib-eq">${q.eq}</div><div class="lib-sol">Sol: ${q.sol}</div>
      <div class="lib-type">${q.type}</div>
    </button>`).join('');
}
renderLib();
function selectQ(i){
  document.querySelectorAll('.lib-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('lib-'+currentTab+'-'+i).classList.add('selected');
  document.getElementById('inp-pregunta').value=LIBRARY[currentTab][i].eq;
  document.getElementById('inp-solucio').value=LIBRARY[currentTab][i].sol;
}

async function fbGet(p){const r=await fetch(DB+p+'.json');return r.json();}
async function fbSet(p,d){await fetch(DB+p+'.json',{method:'PUT',body:JSON.stringify(d)});}
async function fbPatch(p,d){await fetch(DB+p+'.json',{method:'PATCH',body:JSON.stringify(d)});}
async function fbDelete(p){await fetch(DB+p+'.json',{method:'DELETE'});}

async function saveSessionName(){
  const nom=document.getElementById('inp-session').value.trim();if(!nom)return;
  sessionName=nom;document.getElementById('session-name-display').textContent=nom;
  await fbPatch('/game',{sessionName:nom});
}

async function init(){
  try{
    const game=await fbGet('/game');
    document.getElementById('status-dot').className='status-dot on';
    document.getElementById('status-text').textContent='Connectat';
    if(game&&game.sessionName){sessionName=game.sessionName;document.getElementById('session-name-display').textContent=sessionName;document.getElementById('inp-session').value=sessionName;}
  }catch(e){document.getElementById('status-text').textContent='Error de connexió';}
  updateSidebar();setInterval(updateSidebar,3000);
  startPoll();
}
init();

async function updateSidebar(){
  const players=await fbGet('/players')||{};
  const list=Object.entries(players).sort((a,b)=>(b[1].points||0)-(a[1].points||0));
  const el=document.getElementById('students-list');
  if(!list.length){el.innerHTML='<div class="empty-txt">Esperant alumnes...</div>';return;}
  el.innerHTML=list.map(([key,p])=>`
    <div class="student-item">
      <div class="student-dot"></div>
      <div class="student-name">${p.name}</div>
      <div class="student-pts">${p.points||0}pts</div>
      <button class="btn-kick" onclick="kickPlayer('${key}','${p.name}')" title="Expulsar">✕</button>
    </div>`).join('');
}

async function kickPlayer(key,name){
  if(!confirm(`Segur que vols expulsar "${name}"?`))return;
  await fbSet('/players/'+key+'/kicked',true);await fbDelete('/players/'+key);updateSidebar();
}

function startPoll(){
  if(pollInterval)clearInterval(pollInterval);
  pollProf();pollInterval=setInterval(pollProf,2000);
}

async function pollProf(){
  const state=await fbGet('/game');
  if(!state||state.phase!=='active')return;
  const players=await fbGet('/players')||{};
  const responses=state.responses||{};
  document.getElementById('resp-num').textContent=Object.keys(responses).length;
  document.getElementById('resp-total').textContent=Object.keys(players).length;
}

async function launchQuestion(){
  const q=document.getElementById('inp-pregunta').value.trim();
  const sol=document.getElementById('inp-solucio').value.trim();
  const temps=parseInt(document.getElementById('inp-temps').value);
  if(!q||!sol){alert('Omple la pregunta i la solució!');return;}
  await fbSet('/game',{phase:'active',question:q,solution:sol,questionId:Date.now(),timeLimit:temps,startedAt:Date.now(),responses:{},ranking:[],sessionName});
  document.getElementById('prof-setup').style.display='none';
  document.getElementById('prof-active').style.display='block';
  document.getElementById('prof-results').style.display='none';
  document.getElementById('prof-eq-display').textContent=q;
}

async function closeQuestion(){
  if(pollInterval)clearInterval(pollInterval);
  const state=await fbGet('/game');if(!state)return;
  const responses=state.responses||{};
  const players=await fbGet('/players')||{};
  const ranking=Object.values(players).sort((a,b)=>(b.points||0)-(a.points||0)).map(p=>({name:p.name,points:p.points||0}));
  await fbPatch('/game',{phase:'results',ranking});
  const roundEntry={question:state.question,solution:state.solution,responses,timestamp:Date.now(),timeLimit:state.timeLimit||45};
  const existing=await fbGet('/history')||[];
  const histArr=Array.isArray(existing)?existing:Object.values(existing);
  histArr.push(roundEntry);await fbSet('/history',histArr);
  renderStats(responses,Object.values(players).length);
  renderResponses(responses,state.solution);
  document.getElementById('prof-active').style.display='none';
  document.getElementById('prof-results').style.display='block';
  startPoll();
}

function renderStats(responses,totalPlayers){
  const rows=Object.values(responses);
  const correct=rows.filter(r=>r.correct).length;
  const pct=rows.length?Math.round((correct/rows.length)*100):0;
  const participation=totalPlayers?Math.round((rows.length/totalPlayers)*100):0;
  const avgPts=rows.length?Math.round(rows.reduce((s,r)=>s+r.points,0)/rows.length):0;
  const pctCls=pct>=70?'good':pct>=40?'mid':'bad';
  document.getElementById('round-stats').innerHTML=`
    <div class="stat-card"><div class="stat-val ${pctCls}">${pct}%</div><div class="stat-label">Encerts</div></div>
    <div class="stat-card"><div class="stat-val">${participation}%</div><div class="stat-label">Participació</div></div>
    <div class="stat-card"><div class="stat-val">${avgPts}</div><div class="stat-label">Pts mitjans</div></div>`;
  const sem=pct>=70?{cls:'green',msg:'Molt bé! Podem continuar.'}:pct>=40?{cls:'yellow',msg:'Considera repassar-ho breument.'}:{cls:'red',msg:'Convé explicar-ho de nou.'};
  document.getElementById('round-semaforo').innerHTML=`<div class="semaforo ${sem.cls}"><div class="sem-dot"></div><span>${sem.msg}</span></div>`;
}

function renderResponses(responses,solution){
  const rows=Object.values(responses).sort((a,b)=>a.time-b.time);
  document.getElementById('prof-resp-tbody').innerHTML=rows.length
    ?rows.map(r=>`<tr><td>${r.name}</td><td style="font-family:monospace;font-size:0.8rem">${r.answer}</td><td><span class="badge ${r.correct?'badge-ok':'badge-ko'}">${r.correct?'OK':'KO'}</span></td><td style="color:var(--gold);font-weight:700">+${r.points}</td></tr>`).join('')
    :'<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1rem">Cap resposta</td></tr>';
}

async function nextQuestion(){
  await fbSet('/game',{phase:'waiting',sessionName});
  document.getElementById('inp-pregunta').value='';document.getElementById('inp-solucio').value='';
  document.querySelectorAll('.lib-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('prof-setup').style.display='block';
  document.getElementById('prof-results').style.display='none';
}

async function endSession(){
  const players=await fbGet('/players')||{};
  const ranking=Object.values(players).sort((a,b)=>(b.points||0)-(a.points||0));
  const raw=await fbGet('/history')||[];
  const rounds=Array.isArray(raw)?raw:Object.values(raw);
  const sessId='sess_'+Date.now();
  const sessions=await fbGet('/sessions')||{};
  sessions[sessId]={name:sessionName||'Sessió sense nom',date:new Date().toLocaleDateString('ca-ES'),ranking,rounds};
  await fbSet('/sessions',sessions);
  await fbDelete('/history');
  showPodi(ranking);
}

function showPodi(ranking){
  const top=ranking.slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const order=[1,0,2];
  const bars=order.map(i=>{
    const p=top[i];if(!p)return'';
    return`<div class="podi-bar">
      <div class="podi-avatar">${p.name.slice(0,2).toUpperCase()}</div>
      <div class="podi-pname">${p.name}</div>
      <div class="podi-pts">${p.points} pts</div>
      <div class="podi-block"><div class="podi-medal">${medals[i]}</div></div>
    </div>`;
  }).join('');
  const el=document.getElementById('podi-overlay');
  el.innerHTML=`<div class="podi-title">FI DE LA MISSIÓ</div>
    <div class="podi-sub">${sessionName||'Artemis Quiz'} · ${new Date().toLocaleDateString('ca-ES')}</div>
    <div class="podi-bars">${bars}</div>
    <button class="podi-close" onclick="closePodi()">Tancar podi</button>`;
  el.style.display='flex';
  launchConfetti();
}

function launchConfetti(){
  const colors=['#4fc3f7','#ffd54f','#69f0ae','#ff5252','#7c4dff','#ff8a65'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='confetti-piece';
    c.style.left=Math.random()*100+'vw';c.style.top='-20px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*3)+'s';
    c.style.animationDelay=(Math.random()*2)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),6000);
  }
}

function closePodi(){
  document.getElementById('podi-overlay').style.display='none';
  document.getElementById('prof-setup').style.display='block';
  document.getElementById('prof-results').style.display='none';
}

async function resetGame(){
  if(!confirm('Segur? Esborrarà tots els punts, jugadors i historial.'))return;
  await fbSet('/game',{phase:'waiting',sessionName});await fbDelete('/players');await fbDelete('/history');
  document.getElementById('inp-pregunta').value='';document.getElementById('inp-solucio').value='';
  document.querySelectorAll('.lib-card').forEach(c=>c.classList.remove('selected'));

function downloadHistReport(){if(!selectedHistSession)return;generateAndDownload(selectedHistSession.name,selectedHistSession.date,selectedHistSession.ranking||[],selectedHistSession.rounds||[]);}

async function downloadReport(){
  const players=await fbGet('/players')||{};
  const ranking=Object.values(players).sort((a,b)=>(b.points||0)-(a.points||0));
  const raw=await fbGet('/history')||[];
  const rounds=Array.isArray(raw)?raw:Object.values(raw);

function generateComment(playerName,rounds){
  const myRounds=rounds.filter(r=>Object.values(r.responses||{}).some(x=>x.name===playerName));
  if(!myRounds.length)return'No ha participat en cap ronda.';
  const byType={};let ok=0,total=0,tSum=0,tCount=0;
  myRounds.forEach(r=>{
    const resp=Object.values(r.responses||{}).find(x=>x.name===playerName);if(!resp)return;
    total++;if(resp.correct)ok++;
    const type=detectType(r.question);
    if(!byType[type])byType[type]={ok:0,total:0};
    byType[type].total++;if(resp.correct)byType[type].ok++;
    if(resp.time&&r.timestamp){const e=(resp.time-(r.timestamp-(r.timeLimit||45)*1000));if(e>0&&e<90000){tSum+=e/1000;tCount++;}}
  });
  const pct=Math.round((ok/total)*100);
  const avgTime=tCount?Math.round(tSum/tCount):null;
  const weak=Object.entries(byType).filter(([,v])=>v.ok/v.total<0.5).map(([t])=>t);
  const strong=Object.entries(byType).filter(([,v])=>v.ok/v.total===1&&v.total>1).map(([t])=>t);
  const lines=[];
  if(pct===100)lines.push('Ha resolt totes les operacions correctament: rendiment excel·lent.');
  else if(pct>=70)lines.push(`Ha encertat el ${pct}% de les operacions. Bon rendiment general.`);
  else if(pct>=40)lines.push(`Ha encertat el ${pct}% de les operacions. Hi ha marge de millora.`);
  else lines.push(`Ha encertat només el ${pct}% de les operacions. Necessita reforç.`);
  if(weak.length)lines.push(`Mostra dificultats en: ${weak.join(', ')}.`);
  else if(strong.length)lines.push(`Domina especialment: ${strong.join(', ')}.`);
  else lines.push('Ha treballat tots els tipus d\'operació de forma equilibrada.');
  if(avgTime!==null){
    if(avgTime<15)lines.push(`Respon molt ràpidament (mitjana ${avgTime}s). Confiança alta.`);
    else if(avgTime<30)lines.push(`Velocitat de resposta adequada (mitjana ${avgTime}s).`);
    else lines.push(`Respon amb calma (mitjana ${avgTime}s). Podria guanyar agilitat.`);
  }
  return lines.slice(0,3).join(' ');
}

function detectType(q){
  if(q.includes('+'))return'Suma';
  if(q.includes('-')&&!q.includes('·')&&!q.includes('÷'))return'Resta';
  if(q.includes('÷'))return'Divisió';
  if(q.includes('²')||q.includes('³')||q.includes('⁴')||q.includes('⁵')||q.includes('('))return'Potència';
  if(q.includes('·'))return'Multiplicació';
  return'Operació';
}

function generateAndDownload(name,date,ranking,rounds){
  const medals=['🥇','🥈','🥉'];
  let html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Artemis Quiz — ${name}</title>
  <style>body{font-family:Arial,sans-serif;color:#1a1a2e;padding:2rem;max-width:820px;margin:0 auto;font-size:14px;}
  h1{font-size:1.4rem;color:#0a1535;border-bottom:3px solid #4fc3f7;padding-bottom:0.5rem;margin-bottom:0.2rem;}
  .sub{font-size:0.8rem;color:#888;margin-bottom:2rem;}
  h2{font-size:1rem;color:#0a1535;margin:1.5rem 0 0.5rem;padding:6px 10px;background:#f0f6ff;border-left:3px solid #4fc3f7;}
  .sol{font-size:0.82rem;color:#555;margin-bottom:0.5rem;padding-left:4px;}
  table{width:100%;border-collapse:collapse;margin-bottom:0.75rem;font-size:0.85rem;}
  th{background:#0a1535;color:#4fc3f7;padding:7px 10px;text-align:left;font-size:0.78rem;}
  td{padding:6px 10px;border-bottom:1px solid #e8eef8;vertical-align:top;}
  tr:nth-child(even) td{background:#f8faff;}
  .ok{color:#2e7d32;font-weight:bold;}.ko{color:#c62828;font-weight:bold;}
  .comment{font-size:0.78rem;color:#444;background:#f8f9ff;border-left:3px solid #7c4dff;padding:6px 10px;border-radius:0 4px 4px 0;font-style:italic;line-height:1.5;display:block;margin-top:2px;}
  .no-data{color:#aaa;text-align:center;font-style:italic;padding:8px;}</style></head><body>
  <h1>ARTEMIS QUIZ — ${name}</h1>
  <div class="sub">${date} · ${rounds.length} rondes · ${ranking.length} alumnes</div>
  <h2>Ranking final i valoracions</h2>
  <table><thead><tr><th>Pos.</th><th>Alumne</th><th>Punts</th></tr></thead><tbody>`;
  ranking.forEach((r,i)=>{
    const comment=generateComment(r.name,rounds);
    html+=`<tr><td>${medals[i]||'#'+(i+1)}</td><td><b>${r.name}</b><br><span class="comment">${comment}</span></td><td>${r.points} pts</td></tr>`;
  });
  html+=`</tbody></table>`;
  if(!rounds.length){html+=`<p style="color:#aaa">Cap ronda registrada.</p>`;}
  else{
    rounds.forEach((round,ri)=>{
      const rows=Object.values(round.responses||{}).sort((a,b)=>a.time-b.time);
      html+=`<h2>Ronda ${ri+1}: ${round.question}</h2><div class="sol">Resposta correcta: <b>${round.solution}</b></div>
      <table><thead><tr><th>Alumne</th><th>Resposta</th><th>Resultat</th><th>Punts</th></tr></thead><tbody>`;
      if(rows.length){rows.forEach(r=>{html+=`<tr><td>${r.name}</td><td><code>${r.answer}</code></td><td class="${r.correct?'ok':'ko'}">${r.correct?'✓ Correcte':'✗ Incorrecte'}</td><td>${r.correct?'+'+r.points:'0'}</td></tr>`;});}
      else{html+=`<tr><td colspan="4" class="no-data">Cap resposta</td></tr>`;}
      html+=`</tbody></table>`;
    });
  }
  html+=`</body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`artemis-${(name||'sessio').replace(/\s+/g,'-').toLowerCase()}.html`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
</script>
