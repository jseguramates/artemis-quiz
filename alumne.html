<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis Quiz — Alumne</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --space: #020818; --deep: #050d2a; --panel: #0a1535;
  --accent: #4fc3f7; --accent2: #7c4dff; --gold: #ffd54f;
  --green: #69f0ae; --red: #ff5252; --text: #e8f4fd; --muted: #7a9cc0;
  --border: rgba(79,195,247,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--space); color: var(--text); font-family: 'Exo 2', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 60%, rgba(124,77,255,0.1) 0%, transparent 55%), radial-gradient(ellipse at 70% 20%, rgba(79,195,247,0.07) 0%, transparent 50%); pointer-events: none; z-index: 0; }
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%; animation: twinkle var(--d,3s) ease-in-out infinite; animation-delay: var(--delay,0s); }
@keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:1} }

.wrap { position: relative; z-index: 1; width: 100%; max-width: 480px; padding: 2rem 1.25rem; display: flex; flex-direction: column; align-items: center; }
header { text-align: center; margin-bottom: 2rem; }
.logo-moon { width: 56px; height: 56px; background: radial-gradient(circle at 35% 35%, #fff8e1, #ffd54f, #f57f17); border-radius: 50%; position: relative; box-shadow: 0 0 24px rgba(255,213,79,0.5); margin: 0 auto 1rem; }
.logo-moon::after { content: ''; position: absolute; top: 7px; right: 5px; width: 16px; height: 16px; background: var(--space); border-radius: 50%; }
h1 { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; color: var(--accent); }
h1 span { color: var(--gold); }
.tagline { font-size: 0.75rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

.card { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 2rem 1.75rem; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent); }
.card-title { font-family: 'Orbitron', monospace; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; text-align: center; }

label { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
input[type="text"] { width: 100%; background: var(--deep); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; color: var(--text); font-family: 'Exo 2', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 1.25rem; }
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.12); }

.btn-join { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent2), var(--accent)); border: none; border-radius: 12px; color: white; font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(79,195,247,0.3); }
.btn-join:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(79,195,247,0.4); }
.btn-join:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.waiting-anim { text-align: center; padding: 1.5rem 0; }
.orbit { width: 80px; height: 80px; border: 2px solid rgba(79,195,247,0.2); border-radius: 50%; margin: 0 auto 1rem; position: relative; animation: spin 4s linear infinite; }
.orbit::before { content: ''; position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; top: -6px; left: calc(50% - 6px); box-shadow: 0 0 10px var(--accent); }
@keyframes spin { to { transform: rotate(360deg); } }
.waiting-text { font-size: 0.85rem; color: var(--muted); letter-spacing: 1px; }

.eq-big { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 700; text-align: center; color: var(--gold); padding: 1.25rem 1rem; background: var(--deep); border-radius: 12px; border: 1px solid rgba(255,213,79,0.2); margin-bottom: 1rem; text-shadow: 0 0 20px rgba(255,213,79,0.4); letter-spacing: 1px; word-break: break-all; }

.timer-bar-wrap { margin-bottom: 1.25rem; }
.timer-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
.timer-label span:last-child { font-family: 'Orbitron', monospace; color: var(--accent); }
.timer-bar { height: 6px; background: rgba(79,195,247,0.15); border-radius: 99px; overflow: hidden; }
.timer-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 99px; transition: width 1s linear, background 0.5s; }
.timer-fill.urgent { background: linear-gradient(90deg, var(--red), #ff8a65); }

input.ans-input { font-size: 1.2rem; text-align: center; font-family: 'Orbitron', monospace; letter-spacing: 2px; margin-bottom: 1rem; }

.feedback { padding: 14px 18px; border-radius: 12px; text-align: center; font-size: 1rem; font-weight: 500; margin-top: 1rem; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.feedback.ok { background: rgba(105,240,174,0.12); border: 1px solid rgba(105,240,174,0.3); color: var(--green); }
.feedback.ko { background: rgba(255,82,82,0.12); border: 1px solid rgba(255,82,82,0.3); color: var(--red); }
.feedback.wait { background: rgba(255,213,79,0.1); border: 1px solid rgba(255,213,79,0.2); color: var(--gold); }
.feedback-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.feedback-title { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
.feedback-sub { font-size: 0.85rem; opacity: 0.8; }

.section-label { font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; margin-top: 1.25rem; }
.ranking-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 10px; margin-bottom: 6px; background: var(--deep); border: 1px solid var(--border); }
.ranking-item.pos-1 { background: rgba(255,213,79,0.1); border-color: rgba(255,213,79,0.3); }
.ranking-item.pos-2 { background: rgba(176,190,197,0.08); border-color: rgba(176,190,197,0.2); }
.ranking-item.pos-3 { background: rgba(255,138,101,0.08); border-color: rgba(255,138,101,0.2); }
.rank-pos { font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 900; width: 28px; color: var(--muted); }
.pos-1 .rank-pos { color: var(--gold); text-shadow: 0 0 8px rgba(255,213,79,0.5); }
.pos-2 .rank-pos { color: #b0bec5; }
.pos-3 .rank-pos { color: #ff8a65; }
.rank-name { flex: 1; font-size: 0.95rem; font-weight: 500; }
.rank-pts { font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700; color: var(--accent); }
.player-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--deep); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 0.85rem; color: var(--accent); margin-bottom: 1.25rem; }
.player-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="wrap">
  <header>
    <div class="logo-moon"></div>
    <h1>ARTEMIS <span>QUIZ</span></h1>
    <div class="tagline">Missió Monomis</div>
  </header>

  <!-- LOGIN -->
  <div class="card" id="view-login">
    <div class="card-title">Identificació de l'astronauta</div>
    <label>El teu nom o codi</label>
    <input type="text" id="inp-nom" placeholder="ex: Pau, alumne07..." />
    <button class="btn-join" onclick="joinGame()">Unir-me a la missió</button>
    <div id="join-error" style="font-size:0.8rem;color:var(--red);text-align:center;margin-top:0.5rem;display:none;"></div>
  </div>

  <!-- JOC -->
  <div class="card" id="view-joc" style="display:none">
    <div style="text-align:center">
      <span class="player-badge"><span class="player-dot"></span><span id="player-name-badge"></span></span>
    </div>

    <!-- ESPERANT -->
    <div id="phase-waiting">
      <div class="waiting-anim">
        <div class="orbit"></div>
        <div class="waiting-text">Esperant la propera pregunta...</div>
      </div>
    </div>

    <!-- PREGUNTA ACTIVA -->
    <div id="phase-active" style="display:none">
      <div class="eq-big" id="alumne-eq"></div>
      <div class="timer-bar-wrap">
        <div class="timer-label"><span>Temps restant</span><span id="timer-num">45</span></div>
        <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
      </div>
      <label style="text-align:center;display:block;margin-bottom:8px;">La teva resposta</label>
      <input type="text" id="inp-resp" class="ans-input" placeholder="Escriu aquí..." />
      <button class="btn-join" id="btn-enviar" onclick="sendAnswer()">Enviar resposta</button>
      <div id="alumne-feedback" style="display:none;"></div>
    </div>

    <!-- RESULTATS -->
    <div id="phase-results" style="display:none">
      <div id="my-result-area"></div>
      <div class="section-label">Ranking de la missió</div>
      <div id="alumne-ranking-list"></div>
    </div>
  </div>
</div>

<script>
const DB = 'https://monomis-quiz-default-rtdb.europe-west1.firebasedatabase.app';
let nom = '', safeName = '', pollInterval = null;
let currentQId = null, hasAnswered = false;
let timerInterval = null, timerTotal = 45, timerLeft = 45;

function mkStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 100; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.setProperty('--d', (2+Math.random()*4)+'s');
    s.style.setProperty('--delay', (Math.random()*4)+'s');
    c.appendChild(s);
  }
}
mkStars();

async function fbGet(path) { const r = await fetch(DB + path + '.json'); return r.json(); }
async function fbPatch(path, data) { await fetch(DB + path + '.json', { method: 'PATCH', body: JSON.stringify(data) }); }

async function joinGame() {
  nom = document.getElementById('inp-nom').value.trim();
  if (!nom) { showError('Escriu el teu nom per continuar'); return; }
  safeName = nom.replace(/[^a-zA-Z0-9_\-]/g, '_');
  await fbPatch('/players/' + safeName, { name: nom, points: 0, joined: Date.now() });
  document.getElementById('player-name-badge').textContent = nom;
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-joc').style.display = 'block';
  startPoll();
}

function showError(msg) {
  const el = document.getElementById('join-error');
  el.textContent = msg; el.style.display = 'block';
}

function startPoll() {
  if (pollInterval) clearInterval(pollInterval);
  poll(); pollInterval = setInterval(poll, 2000);
}

async function poll() {
  const state = await fbGet('/game');
  if (!state) return;

  if (state.phase === 'waiting') {
    showPhase('waiting');
    currentQId = null; hasAnswered = false;
    if (timerInterval) clearInterval(timerInterval);

  } else if (state.phase === 'active') {
    if (state.questionId !== currentQId) {
      currentQId = state.questionId;
      hasAnswered = false;
      document.getElementById('alumne-eq').textContent = state.question;
      document.getElementById('inp-resp').value = '';
      document.getElementById('alumne-feedback').style.display = 'none';
      document.getElementById('btn-enviar').disabled = false;
      startClientTimer(state.timeLimit || 45, state.startedAt || Date.now());
    }
    if (!hasAnswered) showPhase('active');

  } else if (state.phase === 'results') {
    if (timerInterval) clearInterval(timerInterval);
    showPhase('results');
    renderRanking(state.ranking || []);
  }
}

function startClientTimer(total, startedAt) {
  if (timerInterval) clearInterval(timerInterval);
  timerTotal = total;
  const update = () => {
    const elapsed = Math.floor((Date.now() - startedAt) / 1000);
    timerLeft = Math.max(0, total - elapsed);
    const pct = (timerLeft / total) * 100;
    document.getElementById('timer-num').textContent = timerLeft;
    const fill = document.getElementById('timer-fill');
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (timerLeft <= 10 ? ' urgent' : '');
    if (timerLeft <= 0) clearInterval(timerInterval);
  };
  update();
  timerInterval = setInterval(update, 1000);
}

function normalizeAnswer(s) {
  return s.toLowerCase()
    .replace(/\s+/g, '')
    .replace(/\^/g, '')
    .replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g, d => '⁰¹²³⁴⁵⁶⁷⁸⁹'.indexOf(d))
    .replace(/×/g, '*')
    .replace(/·/g, '*');
}

function showPhase(p) {
  ['waiting','active','results'].forEach(ph => {
    document.getElementById('phase-'+ph).style.display = ph===p ? 'block' : 'none';
  });
}

async function sendAnswer() {
  if (hasAnswered) return;
  const resp = document.getElementById('inp-resp').value.trim();
  if (!resp) return;
  hasAnswered = true;
  document.getElementById('btn-enviar').disabled = true;
  if (timerInterval) clearInterval(timerInterval);

  const state = await fbGet('/game');
  const correct = normalizeAnswer(resp) === normalizeAnswer(state.solution || '');
  const timeUsed = timerTotal - timerLeft;
  const speedBonus = correct ? Math.max(0, Math.round((timerLeft / timerTotal) * 50)) : 0;
  const pts = correct ? 100 + speedBonus : 0;

  await fbPatch('/game/responses/' + safeName, { name: nom, answer: resp, correct, points: pts, time: Date.now() });
  if (correct) {
    const player = await fbGet('/players/' + safeName);
    const prev = (player && player.points) ? player.points : 0;
    await fbPatch('/players/' + safeName, { points: prev + pts });
  }

  const fb = document.getElementById('alumne-feedback');
  fb.style.display = 'block';
  fb.className = 'feedback ' + (correct ? 'ok' : 'ko');
  fb.innerHTML = correct
    ? `<div class="feedback-icon">🚀</div><div class="feedback-title">+${pts} PUNTS!</div><div class="feedback-sub">Resposta correcta${speedBonus>0?' · +'+speedBonus+' bonus velocitat':''}!</div>`
    : '<div class="feedback-icon">🌑</div><div class="feedback-title">Incorrecte</div><div class="feedback-sub">Millor sort a la propera pregunta!</div>';
}

function renderRanking(ranking) {
  const medals = ['🥇','🥈','🥉'];
  const myPos = ranking.findIndex(r => r.name === nom);
  const myEntry = ranking[myPos];
  let myResultHtml = '';
  if (myEntry) {
    myResultHtml = `<div class="feedback ${myPos===0?'ok':'wait'}" style="margin-bottom:1rem">
      <div class="feedback-title">${myPos===0?'🏆 Líder de la missió!':'La teva posició: #'+(myPos+1)}</div>
      <div class="feedback-sub">${myEntry.points} punts acumulats</div>
    </div>`;
  }
  document.getElementById('my-result-area').innerHTML = myResultHtml;
  document.getElementById('alumne-ranking-list').innerHTML = ranking.slice(0,10).map((r,i)=>`
    <div class="ranking-item ${i<3?'pos-'+(i+1):''}">
      <div class="rank-pos">${medals[i]||('#'+(i+1))}</div>
      <div class="rank-name">${r.name}${r.name===nom?' (tu)':''}</div>
      <div class="rank-pts">${r.points} pts</div>
    </div>`).join('');
}
</script>
</body>
</html>
